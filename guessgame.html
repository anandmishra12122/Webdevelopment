<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Number Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input[type="number"] {
      padding: 10px;
      width: 60%;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff6f61;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      margin: 5px;
    }

    button:hover {
      background: #ff3b2f;
    }

    #message {
      margin-top: 15px;
      font-size: 16px;
      color: #333;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Guess the Number</h1>
    <input type="number" id="guessInput" placeholder="1-100">
    <div>
      <button id="checkBtn">Check</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div id="message"></div>
  </div>
  <script src="guess.js"></script>
</body>
</html>
