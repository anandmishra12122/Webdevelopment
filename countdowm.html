<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer Layout</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #timerContainer {
    background: #fff;
    padding: 30px;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    text-align: center;
  }

  h1 {
    margin-bottom: 20px;
    color: #333;
  }

  input[type="number"] {
    width: 80%;
    padding: 10px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
  }

  button {
    padding: 10px 25px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    margin-bottom: 20px;
  }

  button:disabled {
    background: #888;
    cursor: not-allowed;
  }

  #displayTimer {
    font-size: 48px;
    color: #333;
    margin-top: 15px;
    font-weight: bold;
  }

  /* Optional: hover effects */
  button:hover:not(:disabled) {
    background: #45a049;
  }
</style>
</head>
<body>

<div id="timerContainer">
  <h1>Countdown Timer</h1>
  <input type="number" id="timeInput" placeholder="Enter seconds" min="1">
  <br>
  <button id="startBtn">Start</button>
  <div id="displayTimer">00</div>
</div>
<script src="count.js"></script>
</body>
</html>
