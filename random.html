<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Number Generator</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
    }

    #number {
      font-size: 50px;
      font-weight: bold;
      margin: 20px 0;
      color: #333;
    }

    button {
      padding: 10px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Random Number</h1>
    <div id="number">0</div>
    <button id="generateBtn">Generate</button>
  </div>
<script src="random.js"></script>
</body>
</html>
