<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>

<div class="calculator" id="calculator">

    <input type="text" id="display" class="display" disabled style="color: white;">

    <div class="buttons">

        <button id="btn-clear" class="btn">C</button>
        <button id="btn-percent" class="btn">%</button>
        <button id="btn-divide" class="btn">/</button>
        <button id="btn-multiply" class="btn">*</button>

        <button id="btn-7" class="btn">7</button>
        <button id="btn-8" class="btn">8</button>
        <button id="btn-9" class="btn">9</button>
        <button id="btn-minus" class="btn operator">-</button>

        <button id="btn-4" class="btn">4</button>
        <button id="btn-5" class="btn">5</button>
        <button id="btn-6" class="btn">6</button>
        <button id="btn-plus" class="btn">+</button>

        <button id="btn-1" class="btn">1</button>
        <button id="btn-2" class="btn">2</button>
        <button id="btn-3" class="btn">3</button>
        <button id="btn-equals" class="btn">=</button>

        <button id="btn-0" class="btn">0</button>
        <button id="btn-dot" class="btn">.</button>

    </div>

</div>
<script src="cal.js"></script>
</body>
</html>
